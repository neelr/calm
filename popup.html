<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calm Feed</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <h1>Calm Feed</h1>
    <label class="toggle">
      <input id="youtubeEnabled" type="checkbox">
      <span>YouTube cleanup</span>
    </label>
    <label class="toggle">
      <input id="xEnabled" type="checkbox">
      <span>X cleanup</span>
    </label>
    <label class="toggle">
      <input id="adblockEnabled" type="checkbox">
      <span>Adblock</span>
    </label>
    <label class="toggle">
      <input id="videospeedEnabled" type="checkbox">
      <span>Video speed</span>
    </label>
  </main>
  <script src="popup.js"></script>
</body>
</html>
